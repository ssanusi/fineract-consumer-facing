name: Frontend Unit and E2E Testing

on:
  push:
    paths:
      - 'frontend/**'
      - 'consumer/**'
      - 'docker-compose.e2e.yml'
      - 'docker/**'
      - '.github/workflows/build-tests-frontend.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - 'consumer/**'
      - 'docker-compose.e2e.yml'
      - 'docker/**'
      - '.github/workflows/build-tests-frontend.yml'

permissions:
  contents: read

jobs:
  unit:
    name: Vitest unit tests
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test -- --no-watch

  e2e:
    name: Playwright e2e tests
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Read Playwright version
        id: pw-version
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browsers (cache miss)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Generate dev JWT signing key
        working-directory: ${{ github.workspace }}
        run: ./consumer/scripts/generate-dev-jwt-key.sh

      - name: Bring up e2e stack
        working-directory: ${{ github.workspace }}
        run: docker compose -f docker-compose.e2e.yml up -d --build --wait --wait-timeout 360

      - name: Run Playwright tests
        env:
          CI: 'true'
        run: npm run e2e

      - name: Dump container logs on failure
        if: failure()
        working-directory: ${{ github.workspace }}
        run: docker compose -f docker-compose.e2e.yml logs --no-color

      - name: Tear down e2e stack
        if: always()
        working-directory: ${{ github.workspace }}
        run: docker compose -f docker-compose.e2e.yml down -v

      - name: Upload Playwright HTML report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 14

      - name: Upload Playwright test-results on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-test-results
          path: frontend/test-results
          retention-days: 14
