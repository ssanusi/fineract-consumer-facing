name: "ASF Allowlist Check"

on:
  workflow_dispatch:
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/**"
  push:
    branches: ["**"]
    paths:
      - ".github/workflows/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  asf-allowlist-check:
    name: ASF Allowlist Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: ASF Allowlist Check
        uses: apache/infrastructure-actions/allowlist-check@27e3be0410e5e9c79a8e9b145f76475cac4bb0a0 # main as of 2026-05-22
