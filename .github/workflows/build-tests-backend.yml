name: Consumer App Unit and E2E Testing

on:
  push:
    paths:
      - 'consumer/**'
      - '.github/workflows/build-tests-backend.yml'
  pull_request:
    paths:
      - 'consumer/**'
      - '.github/workflows/build-tests-backend.yml'

permissions:
  contents: read

defaults:
  run:
    working-directory: consumer

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Cache Gradle dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: | 
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Setup Gradle and Validate Wrapper
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
        with:
          validate-wrappers: true

      - name: Start application stack
        run: docker compose up -d --build --wait --wait-timeout 180

      - name: Verify PostgreSQL connection
        run: |
          while ! pg_isready -d consumerapp -U consumerapp -h 127.0.0.1 -p 5432 ; do
            sleep 1
          done

      - name: Capture OpenAPI spec
        run: ./gradlew --no-daemon openapi

      - name: Upload OpenAPI spec
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: openapi-spec
          path: consumer/build/openapi/openapi.json
          retention-days: 30

      - name: Generate clients
        run: ./gradlew --no-daemon generateClients

      - name: Upload TypeScript client
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: typescript-angular-client
          path: frontend/src/openapi-client
          retention-days: 30

      - name: Run unit tests
        run: ./gradlew --no-daemon test

      - name: Run Cucumber tests
        run: ./gradlew --no-daemon cucumber

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down application stack
        if: always()
        run: docker compose down -v

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: test-results
          path: 'consumer/**/build/reports/'
          retention-days: 5
