name: Consumer App Unit and E2E Testing

on:
  push:
    paths:
      - 'consumer/**'
      - '.github/workflows/build-tests-backend.yml'
  pull_request:
    paths:
      - 'consumer/**'
      - '.github/workflows/build-tests-backend.yml'

permissions:
  contents: read

defaults:
  run:
    working-directory: consumer

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Cache Gradle dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: | 
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Setup Gradle and Validate Wrapper
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          validate-wrappers: true

      - name: Generate dev JWT signing key
        run: ./scripts/generate-dev-jwt-key.sh

      - name: Start application stack
        run: docker compose up -d --build --wait --wait-timeout 180

      - name: Verify PostgreSQL connection
        run: |
          while ! pg_isready -d consumerapp -U consumerapp -h 127.0.0.1 -p 5432 ; do
            sleep 1
          done

      - name: Capture OpenAPI spec
        run: ./gradlew --no-daemon openapi

      - name: Upload OpenAPI spec
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: openapi-spec
          path: consumer/build/openapi/openapi.json
          retention-days: 30

      - name: Generate clients
        run: ./gradlew --no-daemon generateClients

      - name: Upload TypeScript client
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: typescript-angular-client
          path: frontend/src/openapi-client
          retention-days: 30

      - name: Run unit tests
        run: ./gradlew --no-daemon test

      - name: Run Cucumber tests
        run: ./gradlew --no-daemon cucumber

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down application stack
        if: always()
        run: docker compose down -v

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: 'consumer/**/build/reports/'
          retention-days: 5
