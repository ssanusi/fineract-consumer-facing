databaseChangeLog:
  - changeSet:
      id: 002-create-refresh-tokens
      author: fineract-consumer-facing
      changes:
        - createTable:
            tableName: refresh_tokens
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_refresh_tokens_user_id
                    references: users(id)
              - column:
                  name: token_hash
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: device_fingerprint
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: issued_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: revoked_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: rotated_to
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_refresh_tokens_rotated_to
                    references: refresh_tokens(id)
        - createIndex:
            tableName: refresh_tokens
            indexName: idx_refresh_tokens_user_id
            columns:
              - column:
                  name: user_id
      rollback:
        - dropTable:
            tableName: refresh_tokens
