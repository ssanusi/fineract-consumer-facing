spring.application.name=consumer

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/consumerapp}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:consumerapp}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}

spring.jpa.hibernate.ddl-auto=validate

# Honor X-Forwarded-* headers from upstream reverse proxies (nginx in docker-compose.e2e.yml) for HTTPS.
server.forward-headers-strategy=framework

# Fineract service account variables
fineract.client.base-url=${FINERACT_BASE_URL:http://localhost:8888/fineract-provider/api/v1}
fineract.client.username=${FINERACT_SERVICE_USERNAME:mifos}
fineract.client.password=${FINERACT_SERVICE_PASSWORD:password}
fineract.client.tenant-id=${FINERACT_SERVICE_TENANT:default}

# JWT signing — ES256 keypair PEM (PKCS#8 private key + public key in one file), read once at startup.
# Dev: generated by scripts/generate-dev-jwt-key.sh (gitignored). Prod: mounted from a secret manager.
jwt.key-location=${JWT_KEY_LOCATION:file:dev-jwt-key.pem}
jwt.issuer=${JWT_ISSUER:fineract-consumer-bff}

# Authentication session tuning — Durations accept Spring's shorthand (15m, 1d).
# refresh-cookie-secure stays false in dev (plain-HTTP compose stack); set true wherever TLS terminates in front.
authentication.access-token-ttl=${AUTH_ACCESS_TOKEN_TTL:15m}
authentication.challenge-token-ttl=${AUTH_CHALLENGE_TOKEN_TTL:5m}
authentication.refresh-token-ttl=${AUTH_REFRESH_TOKEN_TTL:1d}
authentication.refresh-cookie-secure=${AUTH_REFRESH_COOKIE_SECURE:false}

# OTP email delivery — Mailpit in docker-compose; institution SMTP in prod
spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:1025}
otp.email.from=${OTP_EMAIL_FROM:no-reply@fineract-consumer.local}
otp.email.subject=${OTP_EMAIL_SUBJECT:Your verification code}
