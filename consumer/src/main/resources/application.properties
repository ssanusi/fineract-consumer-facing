spring.application.name=consumer

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/consumerapp}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:consumerapp}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}

spring.jpa.hibernate.ddl-auto=validate

# Honor X-Forwarded-* headers from upstream reverse proxies (nginx in docker-compose.e2e.yml).
# Without this, Spring treats requests as plain HTTP even when the original was HTTPS through nginx.
server.forward-headers-strategy=framework
